{% extends "base.html" %}
{% block title %}Start Campaign{% endblock %}
{% block content %}
  <h2>Start Campaign</h2>
  <form method="POST" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">Goal Amount</label>
      <input type="number" name="goal_amount" step="0.01" class="form-control" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">Collected Amount</label>
      <input type="number" name="collected_amount" step="0.01" class="form-control" required>
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary">Create Campaign</button>
    </div>
  </form>
{% endblock %}
