<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NGO Manager{% endblock %}</title>
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    

  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">NGO Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/add_donation">Add Donation</a></li>
          <li class="nav-item"><a class="nav-link" href="/add_volunteer">Add Volunteer</a></li>
          <li class="nav-item"><a class="nav-link" href="/add_event">Add Event</a></li>
          <li class="nav-item"><a class="nav-link" href="/add_campaign">Add Campaign</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">View Records</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="/view_donations">Donations</a></li>
              <li><a class="dropdown-item" href="/view_volunteers">Volunteers</a></li>
              <li><a class="dropdown-item" href="/view_events">Events</a></li>
              <li><a class="dropdown-item" href="/view_campaigns">Campaigns</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- full-width wrapper -->
  <div class="container-fluid px-5">
    {% block content %}{% endblock %}
  </div>

  <footer class="bg-white text-center py-3 mt-4">
    <small>&copy; {{ current_year }} NGO Manager</small>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
