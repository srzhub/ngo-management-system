{% extends "base.html" %}
{% block title %}Add Donation{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Add Donation</h5>
      </div>
      <div class="card-body">
        <form method="POST" class="row g-3">

          <!-- 1. Existing Donor Dropdown -->
          <div class="col-md-6">
            <label class="form-label">Select Donor</label>
            <select name="donor_id" class="form-select">
              <option value="">— Choose existing donor —</option>
              {% for d in donors %}
                <option value="{{ d.id }}">{{ d.name }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- 2. New Donor Inputs -->
          <div class="col-12">
            <label class="form-label">Or Add New Donor</label>
            <div class="row g-2">
              <div class="col-md-4">
                <input type="text" name="new_donor_name" class="form-control" placeholder="Name">
              </div>
              <div class="col-md-4">
                <input type="email" name="new_donor_email" class="form-control" placeholder="Email (optional)">
              </div>
              <div class="col-md-4">
                <input type="text" name="new_donor_phone" class="form-control" placeholder="Phone (optional)">
              </div>
            </div>
          </div>

          <!-- 3. Campaign Dropdown -->
          <div class="col-md-6">
            <label class="form-label">Campaign</label>
            <select name="campaign_id" class="form-select">
              <option value="">— No campaign —</option>
              {% for c in campaigns %}
                <option value="{{ c.id }}">{{ c.name }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- 4. Amount -->
          <div class="col-md-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount" step="0.01" class="form-control" required>
          </div>

          <!-- 5. Date -->
          <div class="col-md-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required>
          </div>

          <!-- 6. Type -->
          <div class="col-md-6">
            <label class="form-label">Type</label>
            <input type="text" name="type" class="form-control" placeholder="e.g. Money, Food" required>
          </div>

          <!-- 7. Submit Button -->
          <div class="col-12 text-end">
            <button type="submit" class="btn btn-success">Add Donation</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
