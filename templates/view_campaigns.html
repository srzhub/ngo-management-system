{% extends "base.html" %}
{% block title %}View Campaigns{% endblock %}
{% block content %}
  <h2>All Campaigns</h2>
  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Goal</th><th>Collected</th></tr>
      </thead>
      <tbody>
      {% for c in campaigns %}
        <tr>
          <td>{{ c.id }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.goal_amount }}</td>
          <td>{{ c.collected_amount }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
