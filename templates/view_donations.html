{% extends "base.html" %}
{% block title %}View Donations{% endblock %}
{% block content %}
  <h2>All Donations</h2>
  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead>
        <tr><th>ID</th><th>Donor</th><th>Amount</th><th>Date</th><th>Type</th></tr>
      </thead>
      <tbody>
      {% for d in donations %}
        <tr>
          <td>{{ d.id }}</td>
          <td>{{ d.donor_name }}</td>
          <td>{{ d.amount }}</td>
          <td>{{ d.date }}</td>
          <td>{{ d.type }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
